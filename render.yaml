services:
  - type: web
    name: daily-trivia-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn trivia_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    autoDeployTrigger: commit
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "True"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DATABASE_URL
        sync: false
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: TRIVIA_ANSWER_WINDOW_HOURS
        value: "24"
      - key: EMAIL_DELIVERY_PROVIDER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: dailytrivia.manager@gmail.com
      - key: BREVO_SENDER_NAME
        value: Daily Trivia

  - type: web
    name: daily-trivia-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_AUTH_TOKEN_STORAGE_KEY
        value: daily-trivia-auth-token
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
